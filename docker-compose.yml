services:
  app:
    build: .
    ports:
      - "${SWETE_PORT:-8080}:80"
    environment:
      DB_HOST: db
      DB_NAME: swete
      DB_USER: swete
      DB_PASSWORD: swete
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: mariadb:10.5
    environment:
      MARIADB_DATABASE: swete
      MARIADB_USER: swete
      MARIADB_PASSWORD: swete
      MARIADB_ROOT_PASSWORD: rootpassword
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  db_data:
